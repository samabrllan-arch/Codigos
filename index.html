<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Acceso Seguro - Elite [DEBUG MODE]</title>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(10, 10, 10, 0.85); 
            --accent: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.4);
            --success: #00ff88;
            --error: #ff0055;
            --warning: #ffa500;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-color: #222222;
            --input-bg: rgba(0, 0, 0, 0.5);
            --modal-bg: #0a0a0a;
            --modal-grad: linear-gradient(145deg, #0a0a0a, #0f0f11);
            --btn-text: #ffffff;
            --shadow-card: 0 20px 50px rgba(0,0,0,0.9), 0 0 30px var(--accent-glow);
        }

        body.light-mode {
            --bg-color: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #111111;
            --text-muted: #555555;
            --border-color: #dddddd;
            --input-bg: rgba(255, 255, 255, 0.8);
            --modal-bg: #ffffff;
            --modal-grad: linear-gradient(145deg, #ffffff, #f9f9f9);
            --btn-text: #ffffff;
            --shadow-card: 0 20px 50px rgba(0,0,0,0.1), 0 0 30px rgba(124, 58, 237, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: 
                linear-gradient(to bottom, rgba(5, 5, 5, 0.8), rgba(0, 0, 0, 0.95)),
                url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background-image 0.5s ease;
        }

        body.light-mode {
            background-image: 
                linear-gradient(to bottom, rgba(255, 255, 255, 0.85), rgba(240, 242, 245, 0.95)),
                url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1920&auto=format&fit=crop');
        }

        .btn-theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .btn-theme-toggle:hover { transform: scale(1.1); }

        .premium-container {
            width: 100%;
            max-width: 520px;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        .boveda-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--shadow-card);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
            backdrop-filter: blur(10px);
        }

        .thumbnail-wrapper {
            width: 100%;
            height: 200px;
            border-radius: 16px;
            margin-bottom: 5px; 
            overflow: hidden;
            border: 1px solid var(--border-color);
            cursor: pointer;
            position: relative;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .thumbnail-wrapper:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        .thumbnail-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #111; 
            display: block;
        }

        .thumbnail-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(124, 58, 237, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .thumbnail-wrapper:hover .thumbnail-overlay { opacity: 1; }
        .thumbnail-wrapper.activo .thumbnail-overlay { display: none; }
        .thumbnail-wrapper.activo { cursor: default; transform: none; box-shadow: none; margin-bottom: 25px; }

        #formAcceso {
            display: none; 
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s ease;
        }

        #formAcceso.mostrar {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            color: var(--accent);
            font-size: 22px;
        }

        .elite-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 16px 16px 16px 50px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s, color 0.3s;
        }

        .elite-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-submit {
            width: 100%;
            background: var(--accent);
            color: var(--btn-text);
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 5px 20px var(--accent-glow);
        }

        .btn-submit:hover:not(:disabled) {
            background: #8b5cf6;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.6);
        }

        .btn-submit:disabled {
            background: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        .status-msg {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.4;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            display: none;
        }

        .status-msg.show { display: flex; opacity: 1; transform: translateY(0); }
        .status-msg.info { background: rgba(124, 58, 237, 0.1); border: 1px solid var(--accent); color: var(--text-main); }
        .status-msg.error { background: rgba(255, 0, 85, 0.1); border: 1px solid var(--error); color: var(--error); }
        .status-msg.success { background: rgba(0, 255, 136, 0.1); border: 1px solid var(--success); color: var(--success); }
        .status-msg.warning { background: rgba(255, 165, 0, 0.1); border: 1px solid var(--warning); color: var(--warning); }

        /* PANEL DE DEBUG */
        .debug-panel {
            margin-top: 20px;
            background: rgba(255, 165, 0, 0.05);
            border: 1px solid var(--warning);
            border-radius: 12px;
            padding: 15px;
            text-align: left;
            display: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .debug-panel.show { display: block; }

        .debug-title {
            font-size: 0.7rem;
            color: var(--warning);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .debug-item {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin: 5px 0;
            padding-left: 10px;
            border-left: 2px solid var(--warning);
            font-family: 'Courier New', monospace;
        }

        .result-container {
            margin-top: 20px;
            background: rgba(0,255,136,0.05);
            border: 1px dashed rgba(0,255,136,0.5);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .btn-link-neon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--success);
            color: #000;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
            letter-spacing: 1px;
            width: 100%;
            box-shadow: 0 5px 15px rgba(0,255,136,0.3);
        }

        .btn-link-neon:hover {
            background: var(--text-main);
            color: var(--bg-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,255,136,0.6);
        }

        .fa-spin { animation: spin 1s infinite linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .swal-elite-popup {
            border: 1px solid var(--border-color) !important;
            border-radius: 24px !important;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 40px var(--accent-glow) !important;
            background: var(--modal-grad) !important;
        }

        .swal-title-custom {
            color: var(--text-main) !important;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: 60vh;
            min-height: 450px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 136, 0.4);
            box-shadow: 0 10px 30px rgba(0,255,136,0.1);
            background: #ffffff;
        }
    </style>
</head>
<body>

    <button class="btn-theme-toggle" onclick="toggleTheme()" title="Cambiar Tema">
        <span class="material-icons-round" id="themeIcon">light_mode</span>
    </button>

    <div class="premium-container">
        <div class="boveda-card">
            
            <div class="thumbnail-wrapper" id="cajaThumbnail" onclick="revelarFormulario()">
                <img id="imgThumbnail" src="" onerror="usarImagenAlternativa(this)" alt="Thumbnail Premium" class="thumbnail-image">
                <div class="thumbnail-overlay">
                    <span class="material-icons-round" style="font-size: 40px; color: #fff;">touch_app</span>
                </div>
            </div>

            <div id="formAcceso">
                <div class="input-group">
                    <label>Correo de la Cuenta</label>
                    <div class="input-wrapper">
                        <span class="material-icons-round input-icon">email</span>
                        <input type="email" id="txtEmail" class="elite-input" placeholder="ejemplo@gmail.com" autocomplete="off">
                    </div>
                </div>

                <button id="btnBuscar" class="btn-submit" onclick="ejecutarBusqueda()">
                    <span class="material-icons-round" id="btnIcon">search</span>
                    <span id="btnText">BUSCAR CORREO</span>
                </button>
            </div>

            <div id="statusArea" class="status-msg">
                <span class="material-icons-round icon-status">terminal</span>
                <span id="statusText">Sistema listo.</span>
            </div>

            <!-- PANEL DE DEBUG -->
            <div id="debugPanel" class="debug-panel">
                <div class="debug-title">
                    <span class="material-icons-round" style="font-size: 14px;">bug_report</span>
                    LOG DE DEPURACIÓN
                </div>
                <div id="debugContent"></div>
            </div>

            <div id="resultadoFinal" class="result-container">
                <p style="font-size: 0.75rem; color: var(--success); font-weight: 800; letter-spacing: 1px; margin-bottom: 15px;">CORREO ENCONTRADO</p>
                <button onclick="abrirModalCorreo()" class="btn-link-neon">
                    <span class="material-icons-round">mark_email_unread</span> 
                    VER CORREO ORIGINAL
                </button>
                <div id="fechaMsg" style="margin-top: 15px; font-size: 0.75rem; color: var(--text-muted); font-weight: 600;"></div>
            </div>

        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const URL_JSON_GITHUB = "https://samabrllan-arch.github.io/Json-asunto/asuntos.json";
        const LISTA_OBREROS = [
            "https://script.google.com/macros/s/AKfycbyzpyL0LG2cnf9zln8mN9SaTcuRPm-E3lQTQSGlxiuJLxTlLtaStv7BtcjYbIib3EQl/exec"
        ];

        const MI_IMAGEN_THUMBNAIL = "https://drive.google.com/thumbnail?id=TU_ID_AQUI&sz=w1000"; 
        const IMAGEN_REPUESTO = "https://images.unsplash.com/photo-1563206767-5b18f218e8de?q=80&w=1000&auto=format&fit=crop";

        const TIEMPO_COOLDOWN_MS = 30000;
        const KEY_LOCAL_STORAGE = "_portal_ultimo_intento";

        let correoHTMLActual = "";
        let enCooldown = false;
        let debugLogs = [];

        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem('portal_theme') === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeIcon').innerText = 'dark_mode';
            }

            const imgEl = document.getElementById("imgThumbnail");
            if (MI_IMAGEN_THUMBNAIL.trim() !== "" && !MI_IMAGEN_THUMBNAIL.includes("TU_ID_AQUI")) {
                imgEl.src = MI_IMAGEN_THUMBNAIL;
            } else {
                imgEl.src = IMAGEN_REPUESTO;
            }

            verificarCooldownLocal();
        });

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('portal_theme', isLight ? 'light' : 'dark');
            document.getElementById('themeIcon').innerText = isLight ? 'dark_mode' : 'light_mode';
        }

        function usarImagenAlternativa(img) {
            img.src = IMAGEN_REPUESTO;
        }

        document.getElementById("txtEmail").addEventListener("keydown", e => {
            if (e.key === "Enter") ejecutarBusqueda();
        });

        function revelarFormulario() {
            const form = document.getElementById("formAcceso");
            const thumb = document.getElementById("cajaThumbnail");
            
            if (!form.classList.contains("mostrar")) {
                form.style.display = "block";
                thumb.classList.add("activo");
                
                setTimeout(() => {
                    form.classList.add("mostrar");
                    document.getElementById("txtEmail").focus();
                }, 50);
            }
        }

        function verificarCooldownLocal() {
            const ultimoIntento = localStorage.getItem(KEY_LOCAL_STORAGE);
            if (ultimoIntento) {
                const tiempoPasado = Date.now() - parseInt(ultimoIntento);
                if (tiempoPasado < TIEMPO_COOLDOWN_MS) {
                    arrancarTemporizadorBloqueo();
                }
            }
        }

        function arrancarTemporizadorBloqueo() {
            enCooldown = true;
            const btn = document.getElementById("btnBuscar");
            const txtBtn = document.getElementById("btnText");
            const iconBtn = document.getElementById("btnIcon");

            btn.disabled = true;

            const timer = setInterval(() => {
                const ultimoIntento = localStorage.getItem(KEY_LOCAL_STORAGE);
                if (!ultimoIntento) { clearInterval(timer); resetBoton(); return; }

                const tiempoPasado = Date.now() - parseInt(ultimoIntento);
                const restante = Math.ceil((TIEMPO_COOLDOWN_MS - tiempoPasado) / 1000);

                if (restante <= 0) {
                    clearInterval(timer);
                    resetBoton();
                } else {
                    txtBtn.innerText = `ESPERA ${restante}S`;
                }
            }, 1000);
        }

        function resetBoton() {
            enCooldown = false;
            const btn = document.getElementById("btnBuscar");
            const txtBtn = document.getElementById("btnText");
            const iconBtn = document.getElementById("btnIcon");
            
            btn.disabled = false;
            txtBtn.innerText = "BUSCAR CORREO";
            if(iconBtn) iconBtn.innerText = "search";
        }

        function agregarDebugLog(mensaje) {
            debugLogs.push(mensaje);
            const debugContent = document.getElementById("debugContent");
            const item = document.createElement("div");
            item.className = "debug-item";
            item.textContent = mensaje;
            debugContent.appendChild(item);
        }

        function mostrarPanelDebug() {
            document.getElementById("debugPanel").classList.add("show");
        }

        function limpiarDebug() {
            debugLogs = [];
            document.getElementById("debugContent").innerHTML = "";
            document.getElementById("debugPanel").classList.remove("show");
        }

        async function mostrarEstado(texto, icono, clase = 'info', delay = 700) {
            const status = document.getElementById("statusArea");
            const textEl = document.getElementById("statusText");
            const iconEl = status.querySelector(".icon-status");
            
            status.className = `status-msg show ${clase}`;
            iconEl.innerText = icono;
            textEl.innerHTML = texto;
            
            agregarDebugLog(`[${clase.toUpperCase()}] ${texto}`);
            
            await new Promise(resolve => setTimeout(resolve, delay));
        }

        async function ejecutarBusqueda() {
            if (enCooldown) return;
            const ultimoIntento = localStorage.getItem(KEY_LOCAL_STORAGE);
            if (ultimoIntento && (Date.now() - parseInt(ultimoIntento) < TIEMPO_COOLDOWN_MS)) return;

            const email = document.getElementById("txtEmail").value.trim();
            const btn = document.getElementById("btnBuscar");
            const txtBtn = document.getElementById("btnText");
            const iconBtn = document.getElementById("btnIcon");
            const resBox = document.getElementById("resultadoFinal");
            const fechaMsg = document.getElementById("fechaMsg");

            if (!email) {
                Swal.fire({ 
                    icon: 'warning', 
                    title: 'Falta información', 
                    text: 'Por favor, ingresa el correo.', 
                    background: 'var(--modal-bg)', 
                    color: 'var(--text-main)' 
                });
                return;
            }

            // Limpiar debug anterior
            limpiarDebug();
            mostrarPanelDebug();

            localStorage.setItem(KEY_LOCAL_STORAGE, Date.now());
            enCooldown = true;

            btn.disabled = true;
            txtBtn.innerText = "ESCANÉANDO RED...";
            iconBtn.innerText = "sync";
            iconBtn.classList.add("fa-spin"); 
            resBox.style.display = "none";
            correoHTMLActual = "";

            agregarDebugLog("=== INICIO DE BÚSQUEDA ===");
            agregarDebugLog(`Email a buscar: ${email}`);
            agregarDebugLog(`Timestamp: ${new Date().toLocaleString()}`);

            try {
                // FASE 1: Obtener JSON
                await mostrarEstado("Conectando con base de datos de asuntos...", "cloud_download", "info", 500);
                
                let asuntoAEnviar = "";
                try {
                    agregarDebugLog(`Fetching: ${URL_JSON_GITHUB}`);
                    const resJson = await fetch(URL_JSON_GITHUB, { cache: "no-store" });
                    agregarDebugLog(`Response status: ${resJson.status}`);
                    
                    if (!resJson.ok) throw new Error("No se pudo cargar el JSON.");
                    
                    const dataJson = await resJson.json();
                    agregarDebugLog(`JSON recibido: ${JSON.stringify(dataJson)}`);
                    
                    asuntoAEnviar = dataJson.asunto; 
                    if (!asuntoAEnviar) throw new Error("Formato de JSON inválido.");
                    
                    agregarDebugLog(`Asunto extraído: "${asuntoAEnviar}"`);
                } catch (error) {
                    agregarDebugLog(`ERROR JSON: ${error.message}`);
                    throw new Error("Error al obtener las reglas de búsqueda (JSON).");
                }

                await mostrarEstado("Asuntos obtenidos. Iniciando barrido en servidores...", "memory");

                // FASE 2: Búsqueda en Obreros
                let infoExito = null;

                for (let i = 0; i < LISTA_OBREROS.length; i++) {
                    try {
                        const urlBusqueda = `${LISTA_OBREROS[i]}?usuario=${encodeURIComponent(email)}&asunto=${encodeURIComponent(asuntoAEnviar)}`;
                        agregarDebugLog(`Obrero ${i + 1}: ${urlBusqueda}`);
                        
                        const r = await fetch(urlBusqueda);
                        agregarDebugLog(`Obrero ${i + 1} response: ${r.status}`);
                        
                        const d = await r.json();
                        agregarDebugLog(`Obrero ${i + 1} data: ${JSON.stringify(d, null, 2)}`);

                        // Mostrar logs de debug del servidor
                        if (d.debug && Array.isArray(d.debug)) {
                            d.debug.forEach(log => agregarDebugLog(`[SERVIDOR] ${log}`));
                        }

                        if (d.exito && d.encontrado && d.cuerpo) {
                            infoExito = d;
                            correoHTMLActual = d.cuerpo; 
                            agregarDebugLog("✓ CORREO ENCONTRADO EN ESTE OBRERO");
                            break; 
                        } else {
                            agregarDebugLog(`✗ No encontrado en obrero ${i + 1}: ${d.mensaje || 'Sin mensaje'}`);
                        }
                    } catch (e) {
                        agregarDebugLog(`ERROR en obrero ${i + 1}: ${e.message}`);
                        console.warn(`Error en obrero ${i + 1}:`, e);
                    }
                }

                if (!infoExito) {
                    agregarDebugLog("⚠ NINGÚN OBRERO ENCONTRÓ EL CORREO");
                    throw new Error("No se encontró ningún correo reciente. Revisa el panel de debug.");
                }

                // FASE 3: Éxito
                fechaMsg.innerHTML = `<span class="material-icons-round" style="font-size:14px; vertical-align:middle;">schedule</span> Recibido: ${infoExito.hora || "Reciente"}`;
                resBox.style.display = "block";

                agregarDebugLog("=== BÚSQUEDA EXITOSA ===");
                agregarDebugLog(`Remitente: ${infoExito.remitente}`);
                agregarDebugLog(`Destinatario: ${infoExito.destinatario}`);
                
                await mostrarEstado("✓ Correo interceptado con éxito", "check_circle", "success");
                
                iconBtn.classList.remove("fa-spin");
                arrancarTemporizadorBloqueo();

            } catch (err) {
                agregarDebugLog(`ERROR FATAL: ${err.message}`);
                await mostrarEstado(err.message, "error", "error");
                iconBtn.classList.remove("fa-spin");
                arrancarTemporizadorBloqueo();
            }
        }

        window.abrirModalCorreo = function() {
            const isMobile = window.innerWidth <= 768;
            
            Swal.fire({
                html: `
                    <div style="padding: 5px;">
                        <h2 class="swal-title-custom" style="font-size: ${isMobile ? '1.2rem' : '1.5rem'};">Bandeja de Entrada Segura</h2>
                        <div class="iframe-wrapper">
                            <iframe id="iframeCorreo" frameborder="0" style="width: 100%; height: 100%;"></iframe>
                        </div>
                    </div>
                `,
                showConfirmButton: true,
                confirmButtonText: '<span class="material-icons-round" style="vertical-align:middle; margin-right:5px;">check_circle</span> CERRAR',
                confirmButtonColor: '#00ff88',
                background: 'var(--modal-bg)', 
                width: isMobile ? '98%' : '800px',
                padding: isMobile ? '10px' : '20px',
                customClass: { popup: 'swal-elite-popup' },
                didOpen: () => {
                    const iframe = document.getElementById('iframeCorreo');
                    const doc = iframe.contentWindow.document;
                    doc.open();
                    
                    let htmlModificado = correoHTMLActual;
                    if (htmlModificado.includes('<head>')) {
                        htmlModificado = htmlModificado.replace('<head>', '<head><base target="_blank">');
                    } else {
                        htmlModificado = '<base target="_blank">' + htmlModificado;
                    }

                    doc.write(htmlModificado);
                    doc.close();
                }
            });
        }
    </script>
</body>
</html>
